<!DOCTYPE html>
<html style="background: #000 !important; overflow: hidden;">
<head>
    <meta charset="UTF-8">
    <title id="tab-title">My Drive - Google Drive</title>
    <link id="tab-icon" rel="icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" type="image/x-icon">
    
    <style>
        :root {
            --accent: #ffae00;
            --bg-dark: #050505;
        }

        * {
            background-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-dark) !important;
            color: #fff !important;
            font-family: 'Segoe UI', Roboto, 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #main-content {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            text-align: center;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zen-active #main-content {
            opacity: 0.03;
            pointer-events: none;
            transform: scale(0.9) translateY(20px);
        }

        h1 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: #555;
        }

        #timer-container { margin-bottom: 25px; }
        #next-label {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        #countdown {
            font-size: 3.5rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .input-group {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 10px;
        }

        input {
            flex: 1;
            border: none;
            color: #fff;
            padding: 10px;
            outline: none;
            font-size: 14px;
        }

        .go-btn {
            background: var(--accent) !important;
            color: #000 !important;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- Bookmark Section --- */
        .add-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .add-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        .bookmark-list {
            max-height: 100px;
            overflow-y: auto;
            margin-bottom: 15px;
            text-align: left;
        }
        .item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 6px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .item:hover { background: rgba(255,255,255,0.08); }
        .del { color: #555; }
        .del:hover { color: #ff4444; }

        /* --- Ghost Console --- */
        #ghost-console {
            margin-top: 15px;
            text-align: left;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        #log-display {
            height: 50px;
            overflow-y: auto;
            font-size: 10px;
            color: #888;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .log-ts { color: var(--accent); margin-right: 5px; }
        #log-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: none;
            color: #aaa;
            font-size: 10px;
            padding: 5px;
            border-radius: 4px;
            outline: none;
        }

        .controls-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 10px;
            color: #444;
        }
        .footer-btn { cursor: pointer; text-transform: uppercase; padding: 5px; }
        .footer-btn:hover { color: var(--accent); }

        .menu-pop {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            width: 90%;
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            transition: 0.2s;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }
        .menu-pop.active { opacity: 1; pointer-events: all; transform: translateX(-50%) scale(1); }
        #bg-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .opt { cursor: pointer; font-size: 10px; text-align: center; }
        .preview { height: 30px; border-radius: 5px; margin-bottom: 4px; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="main-content">
    <h1>TAB CLOAKER</h1>
    
    <div id="timer-container">
        <div id="next-label">Syncing...</div>
        <div id="countdown">00:00:00</div>
    </div>

    <div class="input-group">
        <input type="text" id="urlIn" placeholder="ENTER URL..." autocomplete="off">
        <button class="go-btn" onclick="launch()">></button>
    </div>

    <button class="add-btn" onclick="saveBookmark()">BOOKMARK</button>
    <div id="list" class="bookmark-list"></div>

    <div id="ghost-console">
        <div id="log-display"></div>
        <input type="text" id="log-input" placeholder="Type a memo..." autocomplete="off">
    </div>

    <div class="controls-footer">
        <div class="footer-btn" onclick="toggleMenu('cloak-menu')">Identity</div>
        <div class="footer-btn" onclick="toggleZen()">Zen  [ > ] key</div>
        <div class="footer-btn" onclick="toggleMenu('bg-menu')">Visuals</div>
    </div>

    <div id="bg-menu" class="menu-pop">
        <div class="opt" onclick="setTheme('galaxy')"><div class="preview" style="background: #222;"></div>Galaxy</div>
        <div class="opt" onclick="setTheme('aurora')"><div class="preview" style="background: #1e1b4b;"></div>Aurora</div>
        <div class="opt" onclick="setTheme('matrix')"><div class="preview" style="background: #000; border: 1px solid #0f0;"></div>Matrix</div>
        <div class="opt" onclick="setTheme('stealth')"><div class="preview" style="background: #111;"></div>Dark</div>
    </div>

    <div id="cloak-menu" class="menu-pop">
        <div class="footer-btn" onclick="setCloak('drive')">Google Drive</div>
        <div class="footer-btn" onclick="setCloak('gmail')">Gmail</div>
        <div class="footer-btn" onclick="setCloak('wiki')">Wikipedia</div>
        <div class="footer-btn" onclick="setCloak('desmos')">Desmos</div>
    </div>
</div>

<script>
    const schedule = [
        { name: "1st Hour", start: "07:35" },
        { name: "Advisory", start: "08:24" },
        { name: "2nd Hour", start: "08:56" },
        { name: "3rd Hour", start: "09:45" },
        { name: "4th Hour", start: "10:34" },
        { name: "5th Hour", start: "11:23" },
        { name: "Lunch", start: "12:12" },
        { name: "6th Hour", start: "12:51" },
        { name: "7th Hour", start: "13:40" }
    ];

    function updateCountdown() {
        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        let nextClass = null;
        for (const session of schedule) {
            const [hrs, mins] = session.start.split(':').map(Number);
            if ((hrs * 60 + mins) > currentTime) { nextClass = session; break; }
        }
        const label = document.getElementById('next-label');
        const display = document.getElementById('countdown');
        if (nextClass) {
            const [tH, tM] = nextClass.start.split(':').map(Number);
            const target = new Date(); target.setHours(tH, tM, 0);
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            label.innerText = `Next: ${nextClass.name}`;
            display.innerText = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        } else {
            label.innerText = "Status"; display.innerText = "OFF CLOCK";
        }
    }
    setInterval(updateCountdown, 1000);

    // --- Zen Logic ---
    function toggleZen() { document.body.classList.toggle('zen-active'); }
    window.addEventListener('keydown', (e) => {
        if (e.key === '>') {
            if (document.activeElement.tagName !== 'INPUT') { e.preventDefault(); toggleZen(); }
        }
    });

    // --- Bookmark Logic ---
    function saveBookmark() {
        const v = document.getElementById('urlIn').value.trim();
        if(!v) return;
        let l = JSON.parse(localStorage.getItem('cloaker_bookmarks') || '[]');
        if(!l.includes(v)) { l.push(v); localStorage.setItem('cloaker_bookmarks', JSON.stringify(l)); loadBookmarks(); }
        document.getElementById('urlIn').value = '';
    }

    function loadBookmarks() {
        const b = document.getElementById('list');
        const l = JSON.parse(localStorage.getItem('cloaker_bookmarks') || '[]');
        b.innerHTML = '';
        l.forEach(i => {
            const r = document.createElement('div'); r.className = 'item';
            r.onclick = () => launch(i);
            r.innerHTML = `<span>${i.split('/')[2] || i}</span><span class="del" onclick="event.stopPropagation(); deleteBookmark('${i}')">×</span>`;
            b.appendChild(r);
        });
    }

    function deleteBookmark(v) {
        let l = JSON.parse(localStorage.getItem('cloaker_bookmarks') || '[]');
        l = l.filter(i => i !== v);
        localStorage.setItem('cloaker_bookmarks', JSON.stringify(l));
        loadBookmarks();
    }

    // --- Console Logic ---
    const logInput = document.getElementById('log-input');
    const logDisplay = document.getElementById('log-display');
    logInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && logInput.value.trim()) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-ts">[${time}]</span> ${logInput.value.trim()}`;
            logDisplay.appendChild(entry);
            logInput.value = '';
            logDisplay.scrollTop = logDisplay.scrollHeight;
        }
    });

    // --- System Logic ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let animationId;

    const presets = {
        drive: { t: 'My Drive - Google Drive', i: 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png' },
        gmail: { t: 'Inbox - Gmail', i: 'https://ssl.gstatic.com/ui/v1/icons/mail/images/favicon5.ico' },
        wiki: { t: 'Wikipedia', i: 'https://en.wikipedia.org/favicon.ico' },
        desmos: { t: 'Desmos | Calculator', i: 'https://www.desmos.com/favicon.ico' }
    };

    function setCloak(p) {
        const c = presets[p];
        document.getElementById('tab-title').innerText = c.t;
        document.getElementById('tab-icon').href = c.i;
        localStorage.setItem('cloaker_preset', p);
        document.querySelectorAll('.menu-pop').forEach(m => m.classList.remove('active'));
    }

    function toggleMenu(id) {
        document.querySelectorAll('.menu-pop').forEach(m => {
            if (m.id === id) m.classList.toggle('active');
            else m.classList.remove('active');
        });
    }

    function launch(c) {
        let input = c || document.getElementById('urlIn').value.trim();
        if(!input) return;
        let url = /^(http|https):\/\/[^ "]+$|^(www\.)?[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(\/\S*)?$/.test(input) 
                  ? (input.startsWith('http') ? input : 'https://' + input) 
                  : 'https://duckduckgo.com/?q=' + encodeURIComponent(input);
        const win = window.open('about:blank', '_blank');
        const p = presets[localStorage.getItem('cloaker_preset') || 'drive'];
        win.document.write(`<html><head><title>${p.t}</title><link rel="icon" href="${p.i}"><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}iframe{width:100%;height:100%;border:none;}</style></head><body><iframe src="${url}"></iframe></body></html>`);
        win.document.close();
    }

    const themes = {
        galaxy: () => {
            const stars = Array.from({length: 150}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2}));
            return () => {
                ctx.fillStyle = '#010105'; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = '#fff'; stars.forEach(s => { ctx.fillRect(s.x, s.y, s.s, s.s); s.y += 0.2; if(s.y > canvas.height) s.y = 0; });
            };
        },
        matrix: () => {
            const cols = Math.floor(canvas.width/20); const drops = Array(cols).fill(0);
            return () => {
                ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = '#0f0'; ctx.font = "15px monospace";
                drops.forEach((y, i) => {
                    ctx.fillText(String.fromCharCode(Math.random()*128), i*20, y);
                    if(y > canvas.height && Math.random() > 0.98) drops[i] = 0; else drops[i] += 20;
                });
            };
        },
        aurora: () => {
            let t = 0; return () => {
                t += 0.005; ctx.fillStyle = `hsl(${240 + Math.sin(t)*30}, 40%, 4%)`; ctx.fillRect(0,0,canvas.width,canvas.height);
            };
        },
        stealth: () => { return () => { ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,canvas.width,canvas.height); }; }
    };

    function setTheme(t) {
        localStorage.setItem('cloaker_theme', t);
        cancelAnimationFrame(animationId); const engine = themes[t]();
        const loop = () => { engine(); animationId = requestAnimationFrame(loop); }; loop();
    }

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize();
    document.getElementById('urlIn').addEventListener('keypress', (e) => { if (e.key === 'Enter') launch(); });
    setTheme(localStorage.getItem('cloaker_theme') || 'galaxy');
    setCloak(localStorage.getItem('cloaker_preset') || 'drive');
    loadBookmarks();
    updateCountdown();
</script>
</body>
</html>
